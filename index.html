<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서울 테니스 예약 현황</title>
<meta name="description" content="서울시 공공 테니스장 예약 현황을 실시간으로 확인하세요">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎾</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
if (typeof L === 'undefined') {
  document.write('<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"><\/script>');
}
</script>
<style>
:root {
  --bg:#f0f2f5; --panel:#ffffff; --panel2:#f7f8fa;
  --border:#e4e7ec; --border2:#d1d5db;
  --text:#111827; --text2:#374151; --muted:#9ca3af;
  --avail:#16a34a; --avail-bg:#dcfce7;
  --few:#d97706;   --few-bg:#fef3c7;
  --full:#dc2626;  --full-bg:#fee2e2;
  --accent:#2563eb; --accent-bg:#eff6ff;
  --info:#0ea5e9;  --info-bg:#e0f2fe;
  --shadow:0 1px 4px rgba(0,0,0,0.08),0 0 0 1px rgba(0,0,0,0.04);
  --shadow-md:0 4px 16px rgba(0,0,0,0.1);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;}

/* TOPBAR */
.topbar{height:56px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;z-index:200;box-shadow:var(--shadow);}
.brand{display:flex;align-items:center;gap:9px;margin-right:4px;flex-shrink:0;}
.brand-ball{width:32px;height:32px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;box-shadow:0 2px 6px rgba(37,99,235,0.35);}
.brand-name{font-size:0.95rem;font-weight:800;white-space:nowrap;letter-spacing:-0.02em;}
.brand-name em{color:var(--accent);font-style:normal;}
.v-line{width:1px;height:24px;background:var(--border);flex-shrink:0;}

.tab-switcher{display:flex;background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:3px;gap:2px;flex-shrink:0;}
.tab-btn{padding:5px 14px;border-radius:7px;border:none;background:transparent;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:0.78rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all 0.15s;white-space:nowrap;}
.tab-btn:hover{color:var(--text2);}
.tab-btn.active{background:var(--accent);color:#fff;font-weight:700;box-shadow:0 1px 6px rgba(37,99,235,0.3);}

/* Stats chips */
.stats-row{display:flex;gap:6px;flex-shrink:0;align-items:center;}
.stat-chip{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:8px;font-size:0.7rem;font-weight:600;border:1px solid var(--border);background:var(--panel2);cursor:pointer;transition:all 0.15s;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;}
.stat-chip:hover{border-color:var(--accent);background:var(--accent-bg);}
.stat-chip.active{border-color:var(--accent);background:var(--accent-bg);color:var(--accent);}
.stat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.stat-num{font-family:'DM Mono',monospace;font-weight:700;}

.search-wrap{position:relative;flex-shrink:0;}
.search-wrap::before{content:'🔍';position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:0.75rem;pointer-events:none;z-index:1;}
.topbar-search{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:6px 12px 6px 30px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:0.78rem;outline:none;width:160px;transition:all 0.15s;}
.topbar-search:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,0.1);}
.topbar-search::placeholder{color:var(--muted);}
.gu-select{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:0.78rem;outline:none;cursor:pointer;flex-shrink:0;transition:all 0.15s;}
.gu-select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,0.1);}

.refresh-btn{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:0.72rem;cursor:pointer;color:var(--muted);display:flex;align-items:center;gap:4px;transition:all 0.15s;font-family:'Noto Sans KR',sans-serif;flex-shrink:0;}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg);}
.refresh-btn.spinning .refresh-icon{animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.refresh-icon{display:inline-block;font-size:0.8rem;}

.fav-toggle{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:0.72rem;cursor:pointer;color:var(--muted);display:flex;align-items:center;gap:4px;transition:all 0.15s;font-family:'Noto Sans KR',sans-serif;flex-shrink:0;}
.fav-toggle:hover{border-color:#f59e0b;color:#f59e0b;}
.fav-toggle.active{border-color:#f59e0b;background:#fffbeb;color:#d97706;font-weight:600;}

/* VIEWS */
.views{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.view{display:none;flex:1;overflow:hidden;}
.view.active{display:flex;}

/* MAP VIEW */
.view-map{flex-direction:row;}
#map{flex:1;height:100%;min-height:300px;z-index:1;}
.map-side{width:380px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;box-shadow:-2px 0 8px rgba(0,0,0,0.05);}
.map-side-header{padding:14px 18px 12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.map-side-title{font-size:0.83rem;font-weight:700;display:flex;justify-content:space-between;align-items:center;}
.map-side-date{font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--accent);margin-top:3px;}
.legend{display:flex;gap:12px;padding:8px 18px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--panel2);}
.legend-item{display:flex;align-items:center;gap:5px;font-size:0.69rem;color:var(--text2);}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.court-list{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.court-item{padding:12px 18px;cursor:pointer;border-bottom:1px solid var(--border);transition:all 0.12s;border-left:3px solid transparent;position:relative;}
.court-item:hover{background:var(--panel2);}
.court-item.selected{background:var(--accent-bg);border-left-color:var(--accent);}
.ci-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:5px;}
.ci-name{font-size:0.82rem;font-weight:600;color:var(--text);line-height:1.3;}
.ci-gu{font-size:0.68rem;color:var(--muted);margin-top:1px;}
.ci-meta{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.ci-tag{font-size:0.62rem;padding:2px 7px;border-radius:4px;background:var(--panel2);border:1px solid var(--border);color:var(--text2);white-space:nowrap;}
.ci-tag.fee{color:var(--accent);border-color:rgba(37,99,235,0.2);background:var(--accent-bg);}
.ci-tag.free{color:var(--avail);border-color:rgba(22,163,74,0.2);background:var(--avail-bg);}

.fav-star{font-size:0.82rem;cursor:pointer;opacity:0.3;transition:all 0.15s;line-height:1;flex-shrink:0;}
.fav-star:hover{opacity:0.8;transform:scale(1.2);}
.fav-star.active{opacity:1;color:#f59e0b;}

.detail-panel{border-top:1px solid var(--border);padding:14px 18px;flex-shrink:0;background:var(--panel2);overflow-y:auto;max-height:280px;display:none;position:relative;}
.detail-panel.open{display:block;}
.detail-panel h3{font-size:0.85rem;font-weight:700;margin:0 0 8px;line-height:1.4;padding-right:24px;}
.detail-panel .detail-close{position:absolute;top:10px;right:12px;background:none;border:none;font-size:1rem;cursor:pointer;color:var(--muted);padding:2px 6px;border-radius:4px;}
.detail-panel .detail-close:hover{background:var(--border);color:var(--text);}
.detail-panel .goto-btn{padding:7px 14px;border-radius:8px;font-size:0.72rem;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;text-align:center;text-decoration:none;transition:all 0.15s;display:inline-flex;align-items:center;justify-content:center;gap:4px;white-space:nowrap;}
.detail-panel h3{font-size:0.85rem;font-weight:700;margin-bottom:8px;color:var(--text);}
.detail-info{font-size:0.74rem;color:var(--text2);line-height:2;}
.detail-info strong{color:var(--text);}
.goto-btn{display:inline-flex;align-items:center;gap:5px;margin-top:10px;background:var(--accent);color:#fff;font-weight:700;font-size:0.77rem;border:none;border-radius:8px;padding:8px 18px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;text-decoration:none;transition:all 0.15s;box-shadow:0 2px 6px rgba(37,99,235,0.3);}
.goto-btn:hover{background:#1d4ed8;transform:translateY(-1px);}

/* CAL VIEW */
.view-cal{flex-direction:column;overflow:hidden;}
.view-fav{flex-direction:column;overflow:hidden;}
.cal-toolbar{padding:10px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;background:var(--panel);box-shadow:var(--shadow);}
.cal-toolbar-left{display:flex;flex-direction:column;flex-shrink:0;}
.cal-toolbar-title{font-size:0.9rem;font-weight:700;color:var(--text);}
.cal-toolbar-sub{font-size:0.7rem;color:var(--muted);font-family:'DM Mono',monospace;margin-top:1px;}
.cal-toolbar-right{display:flex;align-items:center;gap:8px;margin-left:auto;}

.cal-filters{display:flex;gap:4px;flex-shrink:0;}
.filter-pill{padding:4px 12px;border-radius:20px;font-size:0.72rem;border:1px solid var(--border);background:var(--panel2);color:var(--muted);cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all 0.15s;white-space:nowrap;line-height:1.4;display:inline-flex;align-items:center;}
.filter-pill:hover{border-color:var(--accent);color:var(--accent);}
.filter-pill.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}

/* Cal cards (new grid layout) */
.cal-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 20px;background:var(--bg);}
.cal-card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;}
.cal-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px;transition:all 0.15s;cursor:pointer;position:relative;overflow:hidden;}
.cal-card:hover{border-color:var(--accent);box-shadow:var(--shadow-md);}
.cal-card-accent{position:absolute;top:0;left:0;right:0;height:3px;}
.cal-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.cal-card-name{font-size:0.85rem;font-weight:700;color:var(--text);line-height:1.3;flex:1;margin-right:8px;}
.cal-card-gu{font-size:0.68rem;color:var(--muted);margin-top:2px;}
.cal-card-body{display:flex;flex-direction:column;gap:6px;}
.cal-card-row{display:flex;align-items:flex-start;gap:6px;font-size:0.73rem;color:var(--text2);}
.cal-card-row .icon{width:16px;text-align:center;flex-shrink:0;font-size:0.8rem;}
.cal-card-row .label{color:var(--muted);min-width:48px;flex-shrink:0;font-weight:500;}
.cal-card-actions{display:flex;gap:6px;margin-top:10px;}
.cal-card-btn{flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--panel2);color:var(--text2);font-size:0.72rem;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;text-align:center;text-decoration:none;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:4px;}
.cal-card-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg);}
.cal-card-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.cal-card-btn.primary:hover{background:#1d4ed8;}

/* Badge */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:12px;font-family:'Noto Sans KR',sans-serif;font-size:0.68rem;font-weight:600;white-space:nowrap;}
.badge.접수중{background:var(--avail-bg);color:var(--avail);border:1px solid rgba(22,163,74,0.2);}
.badge.안내중{background:var(--info-bg);color:var(--info);border:1px solid rgba(14,165,233,0.2);}
.badge.접수종료{background:var(--full-bg);color:var(--full);border:1px solid rgba(220,38,38,0.2);}
.badge.예약마감{background:#f3f4f6;color:#6b7280;border:1px solid #e5e7eb;}
.badge.예약일시중지{background:var(--few-bg);color:var(--few);border:1px solid rgba(217,119,6,0.2);}

/* Tooltip */
.tt{position:fixed;background:#1f2937;color:#f9fafb;border-radius:7px;padding:7px 11px;font-size:0.74rem;pointer-events:none;z-index:9999;box-shadow:var(--shadow-md);display:none;white-space:nowrap;line-height:1.5;}

/* Statusbar */
.statusbar{height:28px;background:var(--panel);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:14px;font-family:'DM Mono',monospace;font-size:0.67rem;color:var(--muted);flex-shrink:0;}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--avail);animation:pulse 2s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}

/* Loading */
.loading-bar{height:3px;background:linear-gradient(90deg,var(--accent),#60a5fa,var(--accent));background-size:200% 100%;animation:shimmer 1.2s infinite;position:fixed;top:56px;left:0;right:0;z-index:999;display:none;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Empty state */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--muted);text-align:center;}
.empty-state .emoji{font-size:2.5rem;margin-bottom:12px;}
.empty-state .msg{font-size:0.88rem;font-weight:600;margin-bottom:4px;color:var(--text2);}
.empty-state .sub{font-size:0.76rem;}

/* Leaflet */
.leaflet-container{background:#e8edf2;font-family:'Noto Sans KR',sans-serif;}
.leaflet-popup-content-wrapper{background:var(--panel)!important;border:1px solid var(--border)!important;border-radius:12px!important;box-shadow:0 4px 20px rgba(0,0,0,0.15)!important;color:var(--text)!important;}
.leaflet-popup-content{margin:10px 14px!important;font-family:'Noto Sans KR',sans-serif!important;font-size:0.8rem!important;line-height:1.5!important;overflow:visible!important;}
.leaflet-popup-tip{background:var(--panel)!important;}
.leaflet-popup-close-button{color:var(--muted)!important;top:7px!important;right:9px!important;font-size:18px!important;}

/* Marker */
.court-marker{display:flex;align-items:center;justify-content:center;border-radius:50%;border:2.5px solid rgba(255,255,255,0.9);font-family:'DM Mono',monospace;font-size:0.62rem;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.25);transition:transform 0.15s;color:#fff;}
.court-marker:hover,.court-marker.sel{transform:scale(1.3);box-shadow:0 4px 14px rgba(0,0,0,0.3);}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

/* D-Day badge */
.dday{display:inline-flex;align-items:center;padding:1px 7px;border-radius:8px;font-family:'DM Mono',monospace;font-size:0.62rem;font-weight:600;margin-left:5px;white-space:nowrap;}
.dday.hot{background:#fef2f2;color:#dc2626;border:1px solid rgba(220,38,38,0.15);animation:pulse 2s infinite;}
.dday.soon{background:#fffbeb;color:#d97706;border:1px solid rgba(217,119,6,0.15);}
.dday.ok{background:#f0fdf4;color:#16a34a;border:1px solid rgba(22,163,74,0.15);}
.dday.past{background:#f3f4f6;color:#9ca3af;border:1px solid rgba(156,163,175,0.15);}

/* Sort selector */
.sort-select{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:5px 24px 5px 8px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:0.72rem;outline:none;cursor:pointer;appearance:none;background-image:url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%239ca3af' stroke-width='2'%3e%3cpolyline points='6 9 12 15 18 9'/%3e%3c/svg%3e");background-repeat:no-repeat;background-position:right 5px center;background-size:14px;flex-shrink:0;}
.sort-select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,0.1);}

/* Modal overlay */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);z-index:9000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.25s ease;}
.modal-overlay.open{opacity:1;pointer-events:auto;}
.modal{background:var(--panel);border-radius:16px;box-shadow:0 24px 64px rgba(0,0,0,0.25);width:90%;max-width:560px;max-height:85vh;overflow-y:auto;transform:translateY(20px) scale(0.97);transition:transform 0.25s ease;scrollbar-width:thin;}
.modal-overlay.open .modal{transform:translateY(0) scale(1);}
.modal-close{position:sticky;top:0;z-index:2;display:flex;justify-content:flex-end;padding:12px 16px 0;}
.modal-close button{background:var(--panel2);border:1px solid var(--border);border-radius:8px;width:32px;height:32px;font-size:1rem;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.modal-close button:hover{background:var(--border);color:var(--text);}
.modal-img{width:100%;max-height:200px;object-fit:cover;border-radius:0;}
.modal-body{padding:20px 24px 24px;}
.modal-title{font-size:1.05rem;font-weight:800;color:var(--text);margin-bottom:4px;line-height:1.3;}
.modal-gu{font-size:0.78rem;color:var(--muted);margin-bottom:16px;}
.modal-section{margin-bottom:16px;}
.modal-section-title{font-size:0.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.modal-row{display:flex;align-items:flex-start;gap:8px;font-size:0.8rem;color:var(--text2);line-height:1.7;padding:2px 0;}
.modal-row .icon{flex-shrink:0;width:20px;text-align:center;}
.modal-row .label{flex-shrink:0;color:var(--muted);font-weight:500;min-width:56px;}
.modal-row .value{flex:1;word-break:break-all;}
.modal-desc{font-size:0.78rem;color:var(--text2);line-height:1.7;max-height:120px;overflow-y:auto;background:var(--panel2);padding:10px 14px;border-radius:8px;border:1px solid var(--border);}
.modal-actions{display:flex;gap:8px;margin-top:18px;}
.modal-actions a,.modal-actions button{flex:1;text-align:center;padding:10px;border-radius:10px;font-size:0.82rem;font-weight:700;cursor:pointer;transition:all 0.15s;text-decoration:none;font-family:'Noto Sans KR',sans-serif;border:none;}
.modal-actions .primary{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(37,99,235,0.3);}
.modal-actions .primary:hover{background:#1d4ed8;transform:translateY(-1px);}
.modal-actions .secondary{background:var(--panel2);color:var(--text2);border:1px solid var(--border);}
.modal-actions .secondary:hover{background:var(--border);}

/* Toast */
.toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%) translateY(20px);background:#1f2937;color:#f9fafb;padding:10px 20px;border-radius:10px;font-size:0.8rem;font-weight:500;z-index:9999;opacity:0;transition:all 0.3s ease;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,0.25);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Refresh spinning */
.refresh-btn.spinning .refresh-icon{display:inline-block;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ═══ 태블릿 (900px 이하) ═══ */
@media(max-width:900px){
  .topbar{height:48px;padding:0 12px;gap:8px;}
  .brand-ball{width:26px;height:26px;font-size:0.85rem;}
  .brand-name{font-size:0.82rem;}
  .stats-row{display:none;}
  .v-line:nth-child(n+3){display:none;}
  .view-map{flex-direction:column-reverse;}
  .map-side{width:100%;max-height:44vh;border-left:none;border-top:1px solid var(--border);}
  #map{min-height:200px;}

<script>
// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let COURTS = [];           // API에서 받은 전체 데이터
let filteredCourts = [];   // 필터 적용 후
let selectedCourtId = null;
let currentTab = 'map';
let statusFilter = '전체';
let kwFilter = '전체';
let kwFilters = [];  // 다중선택 배열
let favOnly = false;
let autoRefreshEnabled = true;
let autoRefreshTimer = null;
const markers = {};

const GU_COORDS = {
  '종로구':{lat:37.5730,lng:126.9794},'중구':{lat:37.5636,lng:126.9976},'용산구':{lat:37.5384,lng:126.9654},
  '성동구':{lat:37.5635,lng:127.0369},'광진구':{lat:37.5384,lng:127.0823},'동대문구':{lat:37.5744,lng:127.0396},
  '중랑구':{lat:37.5953,lng:127.0935},'성북구':{lat:37.5894,lng:127.0167},'강북구':{lat:37.6398,lng:127.0255},
  '도봉구':{lat:37.6688,lng:127.0468},'노원구':{lat:37.6542,lng:127.0568},'은평구':{lat:37.6176,lng:126.9227},
  '서대문구':{lat:37.5791,lng:126.9368},'마포구':{lat:37.5638,lng:126.9084},'양천구':{lat:37.5270,lng:126.8559},
  '강서구':{lat:37.5509,lng:126.8495},'구로구':{lat:37.4954,lng:126.8876},'금천구':{lat:37.4569,lng:126.8955},
  '영등포구':{lat:37.5263,lng:126.8963},'동작구':{lat:37.5124,lng:126.9393},'관악구':{lat:37.4784,lng:126.9516},
  '서초구':{lat:37.4837,lng:127.0324},'강남구':{lat:37.5172,lng:127.0473},'송파구':{lat:37.5145,lng:127.1058},
  '강동구':{lat:37.5301,lng:127.1238},
};

// 위치 하드코딩 (API에 좌표가 없으므로)
const KNOWN_LOCS = {
  '잠실': {lat:37.5131,lng:127.0733}, '서울숲': {lat:37.5447,lng:127.0374},
  '보라매': {lat:37.4924,lng:126.9226}, '여의도': {lat:37.5285,lng:126.9326},
  '뚝섬': {lat:37.5298,lng:127.0667}, '반포': {lat:37.5072,lng:126.9963},
  '이촌': {lat:37.5178,lng:126.9638}, '망원': {lat:37.5562,lng:126.9032},
  '올림픽공원': {lat:37.5208,lng:127.1214}, '목동': {lat:37.5258,lng:126.8766},
  '양재': {lat:37.4698,lng:127.0337}, '대치': {lat:37.4966,lng:127.0620},
  '난지': {lat:37.5672,lng:126.8724}, '잠원': {lat:37.5118,lng:127.0082},
  '광나루': {lat:37.5453,lng:127.1033}, '천호': {lat:37.5381,lng:127.1266},
  '고척': {lat:37.4998,lng:126.8672}, '낙성대': {lat:37.4773,lng:126.9543},
  '방화': {lat:37.5705,lng:126.8019}, '공릉': {lat:37.6296,lng:127.0744},
  '정릉': {lat:37.6002,lng:127.0011}, '초안산': {lat:37.6544,lng:127.0447},
  '월드컵': {lat:37.5683,lng:126.8973}, '용마': {lat:37.5802,lng:127.0805},
  '마곡': {lat:37.5602,lng:126.8277}, '중계': {lat:37.6420,lng:127.0680},
  '상암': {lat:37.5773,lng:126.8904}, '한강': {lat:37.5200,lng:126.9600},
};

// ═══════════════════════════════════════
// FAVORITES (서버 + localStorage 병행)
// ═══════════════════════════════════════
var currentUser = localStorage.getItem('tennis_user') || '';
var favCache = []; // 메모리 캐시
var pendingFavAction = null; // 닉네임 입력 대기 중인 액션

function getFavs() {
  return favCache;
}
function isFav(svcid) {
  // place 기반: 해당 court의 place가 favCache에 있으면 true
  var court = COURTS.find(function(c){ return c.svcid === svcid; });
  if (!court || !court.place) return favCache.includes(svcid);
  return favCache.includes(court.place);
}

function setFavs(arr) {
  favCache = arr;
  localStorage.setItem('tennis_favs', JSON.stringify(arr));
  if (currentUser) {
    fetch('/api/favs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user: currentUser, favs: arr })
    }).catch(function(){});
  }
}

function toggleFav(svcid, e) {
  if (e) { e.stopPropagation(); e.preventDefault(); }
  if (!currentUser) {
    pendingFavAction = svcid;
    showNicknameModal();
    return;
  }
  doToggleFav(svcid);
}

function doToggleFav(svcid) {
  var court = COURTS.find(function(c){ return c.svcid === svcid; });
  var key = (court && court.place) ? court.place : svcid;
  var favs = getFavs().slice();
  if (favs.includes(key)) favs = favs.filter(function(f){return f !== key;});
  else favs.push(key);
  setFavs(favs);
  renderAll();
}

function toggleFavFilter() {
  if (!currentUser && favCache.length === 0) {
    pendingFavAction = '__filter__';
    showNicknameModal();
    return;
  }
  favOnly = !favOnly;
  var ft = document.getElementById('favToggle');
  var lft = document.getElementById('listFavToggle');
  if (ft) ft.classList.toggle('active', favOnly);
  if (lft) lft.classList.toggle('active', favOnly);
  applyFilter();
}

// ═══════════════════════════════════════
// NICKNAME MODAL
// ═══════════════════════════════════════
function showNicknameModal() {
  document.getElementById('nicknameOverlay').style.display = 'flex';
  var input = document.getElementById('nicknameInput');
  input.value = '';
  setTimeout(function(){ input.focus(); }, 100);
}

function closeNicknameModal() {
  document.getElementById('nicknameOverlay').style.display = 'none';
  pendingFavAction = null;
}

function submitNickname() {
  var input = document.getElementById('nicknameInput');
  var name = (input.value || '').trim();
  if (name.length < 1 || name.length > 20) {
    input.style.borderColor = 'var(--full)';
    return;
  }
  currentUser = name;
  localStorage.setItem('tennis_user', name);
  closeNicknameModal();
  updateUserBtn();
  showToast('⭐ ' + name + '님 등록됨');

  // 서버에서 즐겨찾기 불러오기
  loadFavsFromServer(name).then(function() {
    // 대기 중인 액션 실행
    if (pendingFavAction === '__filter__') {
      favOnly = !favOnly;
      var ft = document.getElementById('favToggle');
      var lft = document.getElementById('listFavToggle');
      if (ft) ft.classList.toggle('active', favOnly);
      if (lft) lft.classList.toggle('active', favOnly);
      applyFilter();
    } else if (pendingFavAction) {
      doToggleFav(pendingFavAction);
    }
    pendingFavAction = null;
  });
}

// 서버에서 즐겨찾기 불러오기
async function loadFavsFromServer(username) {
  try {
    var res = await fetch('/api/favs?user=' + encodeURIComponent(username));
    var data = await res.json();
    if (data.favs && data.favs.length > 0) {
      favCache = data.favs;
      localStorage.setItem('tennis_favs', JSON.stringify(favCache));
      renderAll();
      showToast('⭐ 즐겨찾기 ' + favCache.length + '개 불러옴');
    } else {
      var local = [];
      try { local = JSON.parse(localStorage.getItem('tennis_favs') || '[]'); } catch(e){}
      if (local.length > 0) {
        favCache = local;
        fetch('/api/favs', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user: username, favs: local })
        }).catch(function(){});
      }
    }
  } catch(e) {
    showToast('⚠️ 서버 연결 실패, 로컬 모드');
  }
}

function statusColor(s) {
  if (s === '접수중') return 'var(--avail)';
  if (s === '안내중') return 'var(--info)';
  if (s === '예약일시중지') return 'var(--few)';
  if (s === '접수종료') return 'var(--full)';
  return '#9ca3af';
}
function statusCls(s) {
  if (s === '접수중') return 'avail';
  if (s === '안내중') return 'info';
  if (s === '예약일시중지') return 'few';
  if (s === '접수종료') return 'full';
  return 'closed';
}
function fmtDate(s) {
  if (!s || s.length < 8) return '-';
  const clean = s.replace(/[^0-9]/g, '');
  if (clean.length >= 8) return `${clean.slice(0,4)}.${clean.slice(4,6)}.${clean.slice(6,8)}`;
  return s;
}
function fmtPrice(v) {
  if (!v || v === '0') return '무료';
  const n = parseInt(v);
  return isNaN(n) || n === 0 ? '무료' : n.toLocaleString() + '원';
}

// DTLCONT에서 요금 정보 추출
function extractPrice(dtlCont) {
  if (!dtlCont) return '';
  var lines = dtlCont.replace(/\\r\\n|\\n|\\r|\r\n|\r|\n/g, '\n').split('\n');
  var prices = [];
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim();
    // "1시간 4,000원" 같은 패턴 매칭
    if (/[0-9,]+원/.test(line) && (
      /평일|주말|공휴일|주간|야간|시간|이용요금|이용료/.test(line)
    )) {
      // 앞뒤 불필요한 텍스트 제거
      var clean = line.replace(/^[-·◎●○•\s]+/, '').trim();
      if (clean.length < 80) prices.push(clean);
    }
  }
  return prices.slice(0, 3).join(' / ');
}

// ═══════════════════════════════════════
// KEYWORD TAGGING (시간대 분류)
// ═══════════════════════════════════════
// 조건식 설명:
// 1. 시설명(SVCNM)에서 키워드 추출 (괄호 안 or 하이픈 뒤)
// 2. 매칭 우선순위: 시설명 > 상세내용(DTLCONT)
// 3. 분류 규칙:
//    - "평일" 포함 → 평일
//    - "토", "일", "공휴일", "주말" 포함 → 주말
//    - "주중" 포함 → 평일 (주중=평일)
//    - "야간" 포함 → 야간
//    - "주간" 포함 (단, "주간보호" 제외) → 주간
//    - "새벽", "조조", "얼리버드" 포함 → 새벽
//    - 위 키워드 없으면 → 평일+주말+주간+야간 모두 해당
function getKeywords(court) {
  var name = court.name || '';
  var dayTags = []; // 평일/주말
  var timeTags = []; // 주간/야간/새벽

  // 1. 시설명 기반 요일 분류
  if (/평일/.test(name) || /주중/.test(name)) dayTags.push('평일');
  if (/토[\/·,]|\/일|주말|토요|일요|공휴일|토일/.test(name)) dayTags.push('주말');

  // 2. 시설명 기반 시간대 분류
  if (/야간/.test(name)) timeTags.push('야간');
  if (/주간/.test(name) && !/주간\s*보호/.test(name)) timeTags.push('주간');
  if (/새벽|조조|얼리/.test(name)) timeTags.push('새벽');

  // 3. 시간대 키워드 없을 때 → 같은 place 보완 추론 → 이용시간 유추
  if (timeTags.length === 0) {
    var pk = court._placeKw || { dayExplicit: [], timeExplicit: [] };
    // 같은 place에 "야간" 전용이 있으면 → 이 코트는 "주간"
    // 같은 place에 "주간" 전용이 있으면 → 이 코트는 "야간"
    // 둘 다 있으면 → 이용시간으로 판단
    var hasYagan = pk.timeExplicit.indexOf('야간') >= 0;
    var hasJugan = pk.timeExplicit.indexOf('주간') >= 0;
    var hasSaebyeok = pk.timeExplicit.indexOf('새벽') >= 0;

    if (hasYagan && !hasJugan) {
      timeTags.push('주간');
    } else if (hasJugan && !hasYagan) {
      timeTags.push('야간');
    } else {
      // 이용시간으로 유추
      var startH = court.useTimeStart ? parseInt(court.useTimeStart.split(':')[0]) : -1;
      var endH = court.useTimeEnd ? parseInt(court.useTimeEnd.split(':')[0]) : -1;
      if (startH >= 0 && endH >= 0) {
        if (startH >= 18) timeTags.push('야간');
        else if (endH <= 18) timeTags.push('주간');
        else timeTags.push('주간', '야간');
      } else {
        timeTags.push('주간', '야간');
      }
    }
  }

  // 4. 요일 키워드 없을 때 → 같은 place 보완 추론
  if (dayTags.length === 0) {
    var pk2 = court._placeKw || { dayExplicit: [], timeExplicit: [] };
    var hasJumal = pk2.dayExplicit.indexOf('주말') >= 0;
    var hasPyeongil = pk2.dayExplicit.indexOf('평일') >= 0;

    if (hasJumal && !hasPyeongil) {
      dayTags.push('평일');
    } else if (hasPyeongil && !hasJumal) {
      dayTags.push('주말');
    } else {
      dayTags.push('평일', '주말');
    }
  }

  return dayTags.concat(timeTags);
}

// 사용자에게 보여줄 태그 라벨
function kwLabel(kw) {

}

function setKwFilter(kw) {
  if (kw === '전체') {
    kwFilters = [];
  } else {
    var idx = kwFilters.indexOf(kw);
    if (idx >= 0) {
      kwFilters.splice(idx, 1);
    } else {
      kwFilters.push(kw);
    }
  }
  // 양쪽 뷰 UI 동기화
  document.querySelectorAll('.kw-filter-pill').forEach(function(b) {
    if (b.dataset.kw === '전체') {
      b.classList.toggle('active', kwFilters.length === 0);
    } else {
      b.classList.toggle('active', kwFilters.indexOf(b.dataset.kw) >= 0);
    }
  });
  applyFilter();
}

// ═══════════════════════════════════════
// COORD RESOLVER
// ═══════════════════════════════════════
function resolveCoord(court) {
  // 이름에서 알려진 위치 매칭
  for (const [key, loc] of Object.entries(KNOWN_LOCS)) {
    if (court.name.includes(key) || (court.place && court.place.includes(key))) {
      return { lat: loc.lat + (Math.random()-0.5)*0.003, lng: loc.lng + (Math.random()-0.5)*0.003 };
    }
  }
  // 구 좌표 기반 fallback
  const gc = GU_COORDS[court.gu];
  if (gc) return { lat: gc.lat + (Math.random()-0.5)*0.015, lng: gc.lng + (Math.random()-0.5)*0.015 };
  return { lat: 37.5326 + (Math.random()-0.5)*0.08, lng: 126.9902 + (Math.random()-0.5)*0.08 };
}

// ═══════════════════════════════════════
// SEOUL API
// ═══════════════════════════════════════
let apiRetryCount = 0;
const MAX_RETRIES = 2;

async function loadSeoulAPI(isRetry) {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  document.getElementById('loadingBar').style.display = 'block';

  try {
    const res = await fetch('/api/seoul?keyword=테니스&start=1&end=1000');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    const root = json['ListPublicReservationSport'];

    if (!root || root.RESULT?.CODE !== 'INFO-000') {
      throw new Error(root?.RESULT?.MESSAGE || 'API 오류');
    }

    const rows = (root.row || []).filter(r =>
      (r.SVCNM || '').includes('테니스') ||
      (r.MINCLASSNM || '').includes('테니스') ||
      (r.MAXCLASSNM || '').includes('테니스')
    );

    if (rows.length > 0) {
      COURTS = rows.map((r, i) => {
        const court = {
          id: i + 1,
          svcid: r.SVCID || '',
          name: r.SVCNM || '테니스장',
          gu: r.AREANM || '',
          place: r.PLACENM || '',
          status: r.SVCSTATNM || '',
          payType: r.PAYATNM || '',
          useTgtInfo: r.USETGTINFO || '',
          svcUrl: r.SVCURL || '',
          imgUrl: r.IMGURL || '',
          telNo: r.TELNO || '',
          dtlCont: r.DTLCONT || '',
          // 이용시간 (V_MIN/V_MAX = 시간)
          useTimeStart: r.V_MIN || '',
          useTimeEnd: r.V_MAX || '',
          // 서비스 기간 (SVCOPNBGNDT/SVCOPNENDDT)
          svcStart: r.SVCOPNBGNDT || '',
          svcEnd: r.SVCOPNENDDT || '',
          // 접수기간
          rcpStart: r.RCPTBGNDT || '',
          rcpEnd: r.RCPTENDDT || '',
          maxClass: r.MAXCLASSNM || '',
          minClass: r.MINCLASSNM || '',
          x: parseFloat(r.X) || 0,
          y: parseFloat(r.Y) || 0,
          priceInfo: extractPrice(r.DTLCONT || ''),
        };
        if (court.x > 0 && court.y > 0) {
          court.lat = court.y;
          court.lng = court.x;
        } else {
          const c = resolveCoord(court);
          court.lat = c.lat;
          court.lng = c.lng;
        }
        court.dday = calcDday(court);
        return court;
      });

      // 같은 좌표 마커 오프셋 처리
      var coordMap = {};
      COURTS.forEach(function(c) {
        var key = c.lat.toFixed(5) + ',' + c.lng.toFixed(5);
        if (!coordMap[key]) coordMap[key] = [];
        coordMap[key].push(c);
      });
      Object.values(coordMap).forEach(function(group) {
        if (group.length <= 1) return;
        var angle = 0;
        var step = (2 * Math.PI) / group.length;
        var radius = 0.0008; // 약 80m 오프셋
        group.forEach(function(c) {
          c.lat += radius * Math.cos(angle);
          c.lng += radius * Math.sin(angle);
          angle += step;
        });
      });

      // 같은 place 내 키워드 보완 추론
      // 예: 같은 장소에 "주말" 전용이 있으면 나머지는 "평일"로, "야간" 전용이 있으면 나머지는 "주간"으로
      var placeKeywords = {};
      COURTS.forEach(function(c) {
        var place = c.place || c.name;
        if (!placeKeywords[place]) placeKeywords[place] = { dayExplicit: [], timeExplicit: [] };
        var name = c.name || '';
        // 이름에서 명시적으로 언급된 키워드만 수집
        if (/평일/.test(name) || /주중/.test(name)) placeKeywords[place].dayExplicit.push('평일');
        if (/토[\/·,]|\/일|주말|토요|일요|공휴일|토일/.test(name)) placeKeywords[place].dayExplicit.push('주말');
        if (/야간/.test(name)) placeKeywords[place].timeExplicit.push('야간');
        if (/주간/.test(name) && !/주간\s*보호/.test(name)) placeKeywords[place].timeExplicit.push('주간');
        if (/새벽|조조|얼리/.test(name)) placeKeywords[place].timeExplicit.push('새벽');
      });
      // 각 place별로 캐시 저장
      COURTS.forEach(function(c) {
        c._placeKw = placeKeywords[c.place || c.name] || { dayExplicit: [], timeExplicit: [] };
      });

      apiRetryCount = 0;
      setApiStatus(`🟢 실시간 · ${rows.length}건`, true);
      showToast(`✅ ${rows.length}개 시설 데이터 갱신 완료`);
    } else {
      throw new Error('테니스 데이터 없음');
    }
  } catch (e) {
    console.warn('API 실패:', e.message);
    if (!isRetry && apiRetryCount < MAX_RETRIES) {
      apiRetryCount++;
      showToast(`⏳ 재시도 중 (${apiRetryCount}/${MAX_RETRIES})...`);
      document.getElementById('loadingBar').style.display = 'none';
      btn.classList.remove('spinning');
      setTimeout(() => loadSeoulAPI(true), 2000);
      return;
    }
    if (COURTS.length === 0) {
      COURTS = getSampleData();
    }
    COURTS.forEach(c => c.dday = calcDday(c));
    // 샘플 데이터에도 place 키워드 보완 추론 적용
    var spk = {};
    COURTS.forEach(function(c) {
      var place = c.place || c.name;
      var name = c.name || '';
      if (!spk[place]) spk[place] = { dayExplicit: [], timeExplicit: [] };
      if (/평일/.test(name) || /주중/.test(name)) spk[place].dayExplicit.push('평일');
      if (/토[\/·,]|\/일|주말|토요|일요|공휴일|토일/.test(name)) spk[place].dayExplicit.push('주말');
      if (/야간/.test(name)) spk[place].timeExplicit.push('야간');
      if (/주간/.test(name) && !/주간\s*보호/.test(name)) spk[place].timeExplicit.push('주간');
      if (/새벽|조조|얼리/.test(name)) spk[place].timeExplicit.push('새벽');
    });
    COURTS.forEach(function(c) { c._placeKw = spk[c.place || c.name] || { dayExplicit: [], timeExplicit: [] }; });
    setApiStatus('🟡 ' + (COURTS.length > 0 ? '샘플 데이터' : '오류'), false);
    showToast(`⚠️ API 연결 실패 — ${e.message}`);
  }

  document.getElementById('loadingBar').style.display = 'none';
  btn.classList.remove('spinning');

  buildGuFilter();
  applyFilter();
  renderAll();
  updateStats();
  scheduleAutoRefresh();
}

  const items = [

  ).join('');
}

// ═══════════════════════════════════════
// FILTER
// ═══════════════════════════════════════
function buildGuFilter() {
  const gus = [...new Set(COURTS.map(c => c.gu))].sort();
  ['guSelect', 'listGuSelect'].forEach(id => {
    const sel = document.getElementById(id);
    const cur = sel.value;
    while (sel.options.length > 1) sel.remove(1);
    gus.forEach(gu => { const o = document.createElement('option'); o.value = gu; o.textContent = gu; sel.appendChild(o); });
    sel.value = cur;
  });
}

function applyFilter() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const gu = document.getElementById('guSelect').value || document.getElementById('listGuSelect').value;
  const favs = getFavs();

  filteredCourts = COURTS.filter(function(c) {
    if (q && !c.name.toLowerCase().includes(q) && !c.gu.includes(q) && !c.place.toLowerCase().includes(q)) return false;
    if (gu && c.gu !== gu) return false;
    if (statusFilter !== '전체' && c.status !== statusFilter) return false;
    if (favOnly && !isFav(c.svcid)) return false;
    if (kwFilters.length > 0) {
      var kws = getKeywords(c);
      // AND: 선택한 필터를 모두 가지고 있어야 함
      for (var ki = 0; ki < kwFilters.length; ki++) {
        if (kws.indexOf(kwFilters[ki]) < 0) return false;
      }
    }
    return true;
  });

  // 정렬: sortSelect 기준
  const sortBy = document.getElementById('sortSelect')?.value || 'status';
  const statusOrder = { '접수중': 0, '안내중': 1, '예약일시중지': 2, '접수종료': 3, '예약마감': 4 };

  filteredCourts.sort((a, b) => {
    // 키워드 필터 활성 시: 정확 매칭(해당 키워드만 가진 것) 우선
    if (kwFilters.length > 0) {
      var aKws = getKeywords(a);
      var bKws = getKeywords(b);
      // 필터 외 추가 키워드 수 (적을수록 정확 매칭)
      var aExtra = aKws.filter(function(k){ return kwFilters.indexOf(k) < 0; }).length;
      var bExtra = bKws.filter(function(k){ return kwFilters.indexOf(k) < 0; }).length;
      if (aExtra !== bExtra) return aExtra - bExtra;
    }

    if (sortBy === 'status') return (statusOrder[a.status] ?? 9) - (statusOrder[b.status] ?? 9);
    if (sortBy === 'name') return a.name.localeCompare(b.name);
    if (sortBy === 'rcpEnd') {
      const aAccepting = a.status === '접수중' ? 0 : 1;
      const bAccepting = b.status === '접수중' ? 0 : 1;
      if (aAccepting !== bAccepting) return aAccepting - bAccepting;
      const aD = a.dday ?? 999, bD = b.dday ?? 999;
      return aD - bD;
    }
    if (sortBy === 'useStart') {
      const aD = a.svcStart || 'z', bD = b.svcStart || 'z';
      return aD.localeCompare(bD);
    }
    return 0;
  });

  renderAll();
  updateStats();
  if (typeof updateUrlParams === 'function') updateUrlParams();
}

// 상태 우선순위
var STATUS_PRIORITY = {'접수중':0, '접수종료':1, '안내중':2, '예약일시중지':3, '예약마감':4};
var COL_MAP = {'var(--avail)':'#16a34a','var(--info)':'#0ea5e9','var(--few)':'#d97706','var(--full)':'#dc2626'};

function getStatusPriority(s) {
  if (!s) return 9;
  if (s.indexOf('접수중') >= 0 && s.indexOf('종료') < 0) return 0;
  if (s.indexOf('접수종료') >= 0) return 1;
  if (s.indexOf('안내') >= 0) return 2;
  if (s.indexOf('중지') >= 0) return 3;
  if (s.indexOf('마감') >= 0) return 4;
  return 9;
}

function makeIcon(status, isSel, count) {
  var sz = isSel ? 36 : 28;
  var hex = COL_MAP[statusColor(status)] || '#9ca3af';
  var label = status === '접수중' ? '✓' : status === '안내중' ? 'i' : '✕';
  var badge = '';
  if (count > 1) {
    badge = '<span style="position:absolute;top:-5px;right:-7px;background:#374151;color:white;font-size:0.5rem;font-weight:700;min-width:14px;height:14px;border-radius:7px;display:flex;align-items:center;justify-content:center;padding:0 3px;border:1.5px solid white;font-family:DM Mono,monospace;">'+count+'</span>';
  }
  return L.divIcon({
    html: '<div style="position:relative;"><div class="court-marker '+(isSel?'sel':'')+'" style="width:'+sz+'px;height:'+sz+'px;background:'+hex+'">'+label+'</div>'+badge+'</div>',
    className: '', iconSize: [sz+8, sz+8], iconAnchor: [(sz+8)/2, (sz+8)/2],
  });
}

function sortByPriority(arr) {
  return arr.slice().sort(function(a,b) {
    return getStatusPriority(a.status) - getStatusPriority(b.status);
  });
}

function buildPopup(group) {
  var sorted = sortByPriority(group);
  var html = '<div style="min-width:260px;max-height:300px;overflow-y:auto;font-family:Noto Sans KR,sans-serif;">';
  html += '<div style="padding:0 0 6px;border-bottom:1px solid #eee;margin-bottom:4px;">';
  html += '<span style="font-size:0.85rem;font-weight:800;">'+(group[0].place||group[0].gu)+'</span>';
  if (group.length > 1) html += ' <span style="font-size:0.65rem;color:#9ca3af;font-weight:500;">'+group.length+'개 프로그램</span>';
  html += '</div>';

  sorted.forEach(function(c, i) {
    var dotCol = COL_MAP[statusColor(c.status)] || '#9ca3af';
    var kws = getKeywords(c).map(function(k){return kwLabel(k);}).join('  ');
    var shortName = c.name;
    if (group[0].place && shortName.includes(group[0].place)) {
      shortName = shortName.replace(group[0].place,'').replace(/[-–—()（）]/g,' ').trim();
    }
    if (!shortName) shortName = c.name;
    var border = i < sorted.length - 1 ? 'border-bottom:1px solid #f3f4f6;' : '';

    html += '<div style="padding:8px 2px;'+border+'cursor:pointer;" onclick="selectCourt('+c.id+',false);map.closePopup()">';
    html += '<div style="display:flex;align-items:center;gap:8px;">';
    html += '<span style="width:10px;height:10px;border-radius:50%;background:'+dotCol+';flex-shrink:0;"></span>';
    html += '<span style="font-size:0.78rem;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+shortName+'</span>';
    html += '<span style="font-size:0.65rem;color:'+dotCol+';font-weight:700;white-space:nowrap;">'+c.status+'</span>';
    html += '</div>';
    html += '<div style="margin-left:18px;margin-top:3px;font-size:0.65rem;color:#9ca3af;white-space:nowrap;">';
    html += kws;
    if (c.useTimeStart) html += '  ⏰ '+c.useTimeStart+' ~ '+c.useTimeEnd;
    html += '</div></div>';
  });
  html += '</div>';
  return html;
}

function renderMapMarkers() {
  Object.values(markers).forEach(function(m){map.removeLayer(m);});
  Object.keys(markers).forEach(function(k){delete markers[k];});

  // 같은 좌표끼리 그룹핑
  var groups = {};
  filteredCourts.forEach(function(court) {
    var key = court.x.toFixed(4) + ',' + court.y.toFixed(4);
    if (court.x === 0 && court.y === 0) key = court.place + '_' + court.gu;
    if (!groups[key]) groups[key] = [];
    groups[key].push(court);
  });

  Object.values(groups).forEach(function(group) {
    var sorted = sortByPriority(group);
    var best = sorted[0]; // 우선순위 가장 높은 상태
    var centerLat = group.reduce(function(s,c){return s+c.lat;},0) / group.length;
    var centerLng = group.reduce(function(s,c){return s+c.lng;},0) / group.length;
    var isAnySel = group.some(function(c){return c.id===selectedCourtId;});

    var m = L.marker([centerLat, centerLng], {
      icon: makeIcon(best.status, isAnySel, group.length)
    }).addTo(map).bindPopup(buildPopup(group), {maxWidth:360, minWidth:280});

    if (group.length === 1) {
      m.on('click', function(){selectCourt(group[0].id, true);});
    }

    group.forEach(function(c){markers[c.id]=m;});
  });
}

      ${court.svcStart ? `<tr><td style="padding:4px 0;vertical-align:top;">📅</td><td style="padding:4px 0;">기간 ${fmtDate(court.svcStart)} ~ ${fmtDate(court.svcEnd)}</td></tr>` : ''}

      <a class="goto-btn" href="${url}" target="_blank" rel="noopener" style="flex:1;background:var(--accent);color:#fff;">예약 바로가기 →</a>

// ═══════════════════════════════════════
// D-DAY CALCULATION
// ═══════════════════════════════════════
function calcDday(court) {
  if (!court.rcpEnd || court.status === '접수종료' || court.status === '예약마감') return null;
  const clean = court.rcpEnd.replace(/[^0-9]/g, '');
  if (clean.length < 8) return null;
  const endDate = new Date(`${clean.slice(0,4)}-${clean.slice(4,6)}-${clean.slice(6,8)}T23:59:59`);
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.ceil((endDate - today) / (1000*60*60*24));
  return diff;
}
function ddayBadge(court) {
  const d = court.dday;
  if (d === null || d === undefined) return '';
  if (d < 0) return `<span class="dday past">마감</span>`;
  if (d === 0) return `<span class="dday hot">D-DAY 🔥</span>`;
  if (d <= 3) return `<span class="dday hot">D-${d}</span>`;
  if (d <= 7) return `<span class="dday soon">D-${d}</span>`;
  return `<span class="dday ok">D-${d}</span>`;
}

function closeModal(e) {

}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ═══════════════════════════════════════
// URL PARAMS (공유 기능)
// ═══════════════════════════════════════
function readUrlParams() {
  const p = new URLSearchParams(location.search);
  if (p.get('gu')) {
    document.getElementById('guSelect').value = p.get('gu');
    document.getElementById('listGuSelect').value = p.get('gu');
  }
  if (p.get('status') && p.get('status') !== '전체') {
    statusFilter = p.get('status');
    document.querySelectorAll('#statusFilters .filter-pill').forEach(b =>
      b.classList.toggle('active', b.dataset.status === statusFilter));
  }
  if (p.get('q')) {
    document.getElementById('searchInput').value = p.get('q');
  }
  if (p.get('tab') === 'list') {
    switchTab('list');
  }
  if (p.get('sort')) {
    const sel = document.getElementById('sortSelect');
    if (sel) sel.value = p.get('sort');
  }
}
function updateUrlParams() {
  const p = new URLSearchParams();
  const gu = document.getElementById('guSelect').value;
  const q = document.getElementById('searchInput').value;
  const sort = document.getElementById('sortSelect')?.value;
  if (gu) p.set('gu', gu);
  if (statusFilter !== '전체') p.set('status', statusFilter);
  if (q) p.set('q', q);
  if (currentTab !== 'map') p.set('tab', currentTab);
  if (sort && sort !== 'status') p.set('sort', sort);
  const str = p.toString();
  const newUrl = location.pathname + (str ? '?' + str : '');
  history.replaceState(null, '', newUrl);
}

// ═══════════════════════════════════════
// KEYBOARD NAVIGATION
// ═══════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (currentTab !== 'map') return;
  if (e.key !== 'ArrowUp' && e.key !== 'ArrowDown' && e.key !== 'Enter') return;

  e.preventDefault();
  const items = document.querySelectorAll('.court-item');
  if (!items.length) return;

  let idx = -1;
  items.forEach((el, i) => { if (parseInt(el.dataset.id) === selectedCourtId) idx = i; });

  if (e.key === 'ArrowDown') idx = Math.min(idx + 1, items.length - 1);
  else if (e.key === 'ArrowUp') idx = Math.max(idx - 1, 0);
  else if (e.key === 'Enter' && selectedCourtId) { openModal(selectedCourtId); return; }

  const newId = parseInt(items[idx]?.dataset.id);
  if (newId) {
    selectCourt(newId, true);
    items[idx].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }
});
